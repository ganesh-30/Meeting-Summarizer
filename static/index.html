<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080c10;
            --surface:   #0d1117;
            --card:      #111820;
            --border:    #1e2a35;
            --accent:    #00d4ff;
            --accent2:   #00ff9d;
            --danger:    #ff4d6d;
            --text:      #e8f0f7;
            --muted:     #4a6275;
            --subtle:    #1a2535;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background grid ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Layout ── */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--subtle);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            transition: all 0.3s;
        }

        .status-badge.connected {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .status-badge.recording {
            border-color: var(--danger);
            color: var(--danger);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.3s;
        }

        .status-badge.connected .status-dot { background: var(--accent2); }
        .status-badge.recording .status-dot {
            background: var(--danger);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ── Controls bar ── */
        .controls {

            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover:not(:disabled) {
            background: #33dcff;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover:not(:disabled) {
            background: #ff6b84;
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--accent2);
            color: #000;
        }
        .btn-success:hover:not(:disabled) {
            background: #33ffb1;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: var(--subtle);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover:not(:disabled) {
            background: var(--border);
            transform: translateY(-1px);
        }

        .controls-divider {
            width: 1px;
            height: 32px;
            background: var(--border);
            margin: 0 4px;
        }

        .session-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 16px;
            font-weight: 500;
            color: var(--accent);
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── Main grid ── */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: 1fr auto;
            gap: 16px;
        }

        /* ── Panel base ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .panel-badge {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 3px 8px;
            background: var(--subtle);
            border-radius: 4px;
            color: var(--muted);
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* ── Transcript panel ── */
        .transcript-panel {
            grid-row: 1 / 2;
        }

        #transcript-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100%;
        }

        .transcript-chunk {
            display: flex;
            gap: 12px;
            padding: 12px 14px;
            background: var(--card);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .chunk-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            flex-shrink: 0;
            gap: 4px;
        }

        .chunk-num {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            background: rgba(0,212,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .chunk-time {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }

        .chunk-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
        }

        .transcript-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            gap: 12px;
            color: var(--muted);
        }

        .transcript-empty .icon {
            font-size: 40px;
            opacity: 0.3;
        }

        .transcript-empty p {
            font-size: 13px;
        }

        /* ── Right column ── */
        .right-col {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Summary panel ── */
        .summary-panel {
            flex: 1;
        }

        #summary-content {
            font-size: 13px;
            line-height: 1.8;
            color: var(--text);
        }

        #summary-content h2 {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            margin: 16px 0 8px;
        }

        #summary-content h2:first-child { margin-top: 0; }

        #summary-content h3 {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent2);
            margin: 12px 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #summary-content ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #summary-content li {
            padding-left: 16px;
            position: relative;
            color: #b0c4d4;
        }

        #summary-content li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-size: 11px;
        }

        .summary-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            gap: 10px;
            color: var(--muted);
            text-align: center;
        }

        .summary-empty .icon { font-size: 32px; opacity: 0.3; }
        .summary-empty p { font-size: 12px; }

        .progressive-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            padding: 3px 8px;
            background: rgba(0,255,157,0.1);
            border: 1px solid rgba(0,255,157,0.2);
            border-radius: 4px;
            color: var(--accent2);
            margin-bottom: 12px;
        }

        /* ── Q&A panel ── */
        .qa-panel {
            flex-shrink: 0;
        }

        .qa-messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .qa-message {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            animation: slideIn 0.3s ease;
        }

        .qa-question {
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.15);
            color: var(--accent);
            align-self: flex-end;
            max-width: 85%;
        }

        .qa-answer {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .qa-input-row {
            display: flex;
            gap: 8px;
        }

        .qa-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .qa-input::placeholder { color: var(--muted); }

        .qa-input:focus {
            border-color: var(--accent);
        }

        .qa-send {
            padding: 10px 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #000;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .qa-send:hover { background: #33dcff; }
        .qa-send:disabled { opacity: 0.35; cursor: not-allowed; }

        /* ── Progress summary panel ── */
        .progress-panel {
            grid-column: 1;
            grid-row: 2;
        }

        /* ── Thinking animation ── */
        .thinking {
            display: flex;
            gap: 5px;
            padding: 8px 0;
        }

        .thinking span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.2s infinite;
        }

        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Recording wave animation ── */
        .wave-container {
            display: none;
            align-items: center;
            gap: 3px;
            height: 24px;
        }

        .wave-container.active { display: flex; }

        .wave-bar {
            width: 3px;
            background: var(--danger);
            border-radius: 3px;
            animation: wave 1s infinite ease-in-out;
        }

        .wave-bar:nth-child(1) { animation-delay: 0.0s; height: 8px; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 20px; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 14px; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        /* ── Toast notifications ── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }

        .toast {
            padding: 12px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            max-width: 320px;
            animation: toastIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.error { border-color: var(--danger); color: var(--danger); }
        .toast.success { border-color: var(--accent2); color: var(--accent2); }
        .toast.info { border-color: var(--accent); color: var(--accent); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── Timer ── */
        .timer {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            padding: 4px 10px;
            background: var(--subtle);
            border-radius: 6px;
        }

        .timer.active { color: var(--danger); }
        .source-select {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            outline: none;
        }

        .source-select:focus {
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<div class="app">

    <!-- Header -->
    <header>
        <div class="logo">
            <div class="logo-icon">🎙</div>
            <div class="logo-text">Meeting<span>AI</span></div>
        </div>
        <div class="header-right">
            <div class="wave-container" id="wave">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <div class="timer" id="timer">00:00</div>
            <div class="status-badge" id="status-badge">
                <div class="status-dot"></div>
                <span id="status-text">Idle</span>
            </div>
        </div>
    </header>

    <!-- Controls -->
    <div class="controls">
        <button class="btn btn-primary" id="btn-start" onclick="startRecording()">
            ● Start Recording
        </button>
        <select id="audio-source" class="source-select">
        <option value="mic">🎤 Mic Only</option>
        <option value="tab">🔊 Tab Audio Only</option>
        <option value="both" selected>🎤+🔊 Mic + Tab (Recommended)</option>
        </select>

        <button class="btn btn-danger" id="btn-stop" onclick="stopRecording()" disabled>
            ■ Stop Recording
        </button>
        <div class="controls-divider"></div>
        <button class="btn btn-success" id="btn-summary" onclick="generateSummary()" disabled>
            ✦ Generate Summary
        </button>
        <button class="btn btn-ghost" id="btn-clear" onclick="clearSession()">
            ↺ Clear
        </button>
        <div class="session-info">
            <div class="stat">
                <span class="stat-value" id="stat-chunks">0</span>
                <span class="stat-label">Chunks</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="stat-words">0</span>
                <span class="stat-label">Words</span>
            </div>
        </div>
    </div>

    <!-- Main grid -->
    <div class="main-grid">

        <!-- Transcript -->
        <div class="panel transcript-panel">
            <div class="panel-header">
                <span class="panel-title">Live Transcript</span>
                <span class="panel-badge" id="transcript-count">0 chunks</span>
            </div>
            <div class="panel-body" id="transcript-body">
                <div id="transcript-content">
                    <div class="transcript-empty">
                        <div class="icon">🎙</div>
                        <p>Start recording to see live transcript</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right column -->
        <div class="right-col">

            <!-- Summary -->
            <div class="panel summary-panel">
                <div class="panel-header">
                    <span class="panel-title">Summary</span>
                    <span class="panel-badge" id="summary-badge">—</span>
                </div>
                <div class="panel-body">
                    <div id="summary-content">
                        <div class="summary-empty">
                            <div class="icon">✦</div>
                            <p>Summary appears here after stopping recording</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Q&A -->
            <div class="panel qa-panel">
                <div class="panel-header">
                    <span class="panel-title">Ask AI</span>
                    <span class="panel-badge">RAG Q&A</span>
                </div>
                <div class="panel-body" style="padding-bottom: 12px;">
                    <div class="qa-messages" id="qa-messages"></div>
                    <div class="qa-input-row">
                        <input
                            class="qa-input"
                            id="qa-input"
                            type="text"
                            placeholder="Ask about the meeting..."
                            onkeydown="if(event.key==='Enter') sendQuestion()"
                            disabled
                        />
                        <button class="qa-send" id="qa-send" onclick="sendQuestion()" disabled>↑</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Progressive Summary -->
        <div class="panel progress-panel">
            <div class="panel-header">
                <span class="panel-title">Progressive Summary</span>
                <span class="panel-badge" id="prog-badge">Updates every 10 min</span>
            </div>
            <div class="panel-body">
                <div id="progressive-content">
                    <div class="summary-empty">
                        <div class="icon">⟳</div>
                        <p>Auto-updates every 10 minutes during recording</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
    // ── State ────────────────────────────────────────────
    let ws = null;
    let mediaRecorder = null;
    let stream = null;
    let sessionId = null;
    let isRecording = false;
    let chunkCount = 0;
    let wordCount = 0;
    let timerInterval = null;
    let timerSeconds = 0;
    let transcriptChunks = [];
    let headerChunk = null;

    // ── Session ID ───────────────────────────────────────
    function generateSessionId() {
        return 'sess_' + Math.random().toString(36).substr(2, 9);
    }

    // ── Timer ────────────────────────────────────────────
    function startTimer() {
        timerSeconds = 0;
        timerInterval = setInterval(() => {
            timerSeconds++;
            const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
            const s = String(timerSeconds % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
        document.getElementById('timer').classList.add('active');
    }

    function stopTimer() {
        clearInterval(timerInterval);
        document.getElementById('timer').classList.remove('active');
    }

    // ── Status badge ─────────────────────────────────────
    function setStatus(state, text) {
        const badge = document.getElementById('status-badge');
        badge.className = 'status-badge ' + state;
        document.getElementById('status-text').textContent = text;
    }

    // ── Toast notifications ───────────────────────────────
    function toast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toasts');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `<span>${type === 'error' ? '✕' : type === 'success' ? '✓' : 'ℹ'}</span> ${message}`;
        container.appendChild(el);
        setTimeout(() => el.remove(), duration);
    }

    // ── WebSocket message handler ─────────────────────────
    function handleMessage(data) {
        switch (data.type) {

            case 'status':
                toast(data.message, 'info');
                break;

            case 'transcript':
                appendTranscript(data.text, data.chunk_id);
                wordCount = data.total_words || wordCount + data.text.split(' ').length;
                chunkCount = data.chunk_id || chunkCount + 1;
                updateStats();
                break;

            case 'progressive_summary':
                renderProgressiveSummary(data.text);
                break;

            case 'final_summary':
                renderFinalSummary(data.text, data);
                break;

            case 'qa_answer':
                renderQAAnswer(data.text, data.question);
                break;

            case 'error':
                toast(data.message, 'error');
                console.error('Backend error:', data);
                break;
        }
    }

    // ── Transcript rendering ──────────────────────────────
    function appendTranscript(text, chunkId) {
        const content = document.getElementById('transcript-content');

        // remove empty state
        const empty = content.querySelector('.transcript-empty');
        if (empty) empty.remove();

        const now = new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const chunk = document.createElement('div');
        chunk.className = 'transcript-chunk';
        chunk.innerHTML = `
            <div class="chunk-text">${escapeHtml(text)}</div>
            <div class="chunk-meta">
                <span class="chunk-num">#${chunkId}</span>
                <span class="chunk-time">${now}</span>
            </div>
        `;
        content.appendChild(chunk);

        // auto scroll
        const body = document.getElementById('transcript-body');
        body.scrollTop = body.scrollHeight;

        // update badge
        document.getElementById('transcript-count').textContent = `${chunkId} chunks`;
    }

    // ── Summary rendering ─────────────────────────────────
    function renderFinalSummary(text, meta) {
        const el = document.getElementById('summary-content');
        el.innerHTML = parseMarkdown(text);

        const badge = document.getElementById('summary-badge');
        badge.textContent = meta.strategy || 'direct';

        toast('Final summary generated', 'success');
    }

    function renderProgressiveSummary(text) {
        const el = document.getElementById('progressive-content');
        const time = new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });

        el.innerHTML = `
            <div class="progressive-tag">⟳ Updated at ${time}</div>
            ${parseMarkdown(text)}
        `;

        document.getElementById('prog-badge').textContent = `Last: ${time}`;
    }

    // ── Q&A rendering ─────────────────────────────────────
    function renderQAAnswer(answer, question) {
        const messages = document.getElementById('qa-messages');

        const answerEl = document.createElement('div');
        answerEl.className = 'qa-message qa-answer';
        answerEl.textContent = answer;
        messages.appendChild(answerEl);
        messages.scrollTop = messages.scrollHeight;

        // re-enable input
        document.getElementById('qa-input').disabled = false;
        document.getElementById('qa-send').disabled = false;
        document.getElementById('qa-input').value = '';
    }

    // ── Stats ─────────────────────────────────────────────
    function updateStats() {
        document.getElementById('stat-chunks').textContent = chunkCount;
        document.getElementById('stat-words').textContent = wordCount;
    }

    // ── Start recording ───────────────────────────────────
    async function startRecording() {
        if (isRecording) {
            toast('Already recording', 'error');
            return;
        }

        // close any existing connection
        if (ws) { ws.close(); ws = null; }

        const source = document.getElementById('audio-source').value;
        sessionId = generateSessionId();

        // ── Step 1: get audio stream based on source ──────────────────────────
        try {
            stream = await _getAudioStream(source);
        } catch (err) {
            toast(`Audio access failed: ${err.message}`, 'error');
            return;
        }

        // ── Step 2: connect WebSocket ─────────────────────────────────────────
        const wsUrl = `ws://localhost:8000/ws/audio?session_id=${sessionId}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            setStatus('connected', 'Connected');
            toast('WebSocket connected', 'success');
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                handleMessage(data);
            } catch (e) {
                console.error('Failed to parse message:', e);
            }
        };

        ws.onclose = () => {
            setStatus('', 'Disconnected');
            if (isRecording) {
                toast('Connection lost', 'error');
                stopRecording();
            }
        };

        ws.onerror = () => toast('WebSocket error', 'error');

        // ── Step 3: setup MediaRecorder ───────────────────────────────────────
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm';

        headerChunk = null;

        mediaRecorder = new MediaRecorder(stream, { mimeType });

        mediaRecorder.ondataavailable = async (event) => {
            if (event.data.size === 0) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            const buffer = await event.data.arrayBuffer();

            if (headerChunk === null) {
                headerChunk = buffer.slice(0, 4096);
                ws.send(buffer);
            } else {
                const combined = new Uint8Array(headerChunk.byteLength + buffer.byteLength);
                combined.set(new Uint8Array(headerChunk), 0);
                combined.set(new Uint8Array(buffer), headerChunk.byteLength);
                ws.send(combined.buffer);
            }
        };

        mediaRecorder.start(15000);
        isRecording = true;
        startTimer();

        // ── Step 4: update UI ─────────────────────────────────────────────────
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-stop').disabled = false;
        document.getElementById('btn-summary').disabled = true;
        document.getElementById('audio-source').disabled = true;
        document.getElementById('wave').classList.add('active');
        document.getElementById('qa-input').disabled = false;   // enable on start
        document.getElementById('qa-send').disabled = false;
        setStatus('recording', 'Recording');

        const sourceLabel = {
            mic: 'Mic only',
            tab: 'Tab audio',
            both: 'Mic + Tab'
        }[source];
        toast(`Recording started — ${sourceLabel}`, 'success');
    }


    async function _getAudioStream(source) {
        /**
         * Returns a MediaStream based on selected source.
         *
         * mic:  getUserMedia — microphone only
         * tab:  getDisplayMedia — tab audio only (video track discarded)
         * both: getUserMedia + getDisplayMedia mixed via Web Audio API
         */

        if (source === 'mic') {
            // existing behaviour — unchanged
            return await navigator.mediaDevices.getUserMedia({ audio: true });
        }

        if (source === 'tab') {
            // getDisplayMedia captures tab audio
            // user sees "Share tab" prompt — must check "Share tab audio"
            const tabStream = await navigator.mediaDevices.getDisplayMedia({
                video: true,   // must request video=true or Chrome rejects
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    sampleRate: 16000
                }
            });

            // discard video track — we only want audio
            tabStream.getVideoTracks().forEach(t => t.stop());

            if (tabStream.getAudioTracks().length === 0) {
                throw new Error(
                    'No tab audio captured. ' +
                    'Make sure to check "Share tab audio" in the share dialog.'
                );
            }

            return tabStream;
        }

        if (source === 'both') {
            // get mic and tab streams simultaneously
            const [micStream, tabStream] = await Promise.all([
                navigator.mediaDevices.getUserMedia({ audio: true }),
                navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        sampleRate: 16000
                    }
                })
            ]);

            // discard video
            tabStream.getVideoTracks().forEach(t => t.stop());

            if (tabStream.getAudioTracks().length === 0) {
                // tab audio not shared — fall back to mic only
                toast('Tab audio not shared — falling back to mic only', 'info');
                return micStream;
            }

            // mix mic + tab using Web Audio API
            const audioContext = new AudioContext();
            const destination = audioContext.createMediaStreamDestination();

            // connect mic to destination
            const micSource = audioContext.createMediaStreamSource(micStream);
            micSource.connect(destination);

            // connect tab audio to destination
            const tabSource = audioContext.createMediaStreamSource(tabStream);
            tabSource.connect(destination);

            // store references for cleanup on stop
            // attach to window so stopRecording can access them
            window._audioContext = audioContext;
            window._micStream = micStream;
            window._tabStream = tabStream;

            // destination.stream is the mixed audio
            return destination.stream;
        }
    }

    // ── Stop recording ────────────────────────────────────
    function stopRecording() {
        if (!isRecording) return;

        isRecording = false;
        headerChunk = null;

        // cleanup Web Audio API resources if mix mode was used
        if (window._audioContext) {
            window._audioContext.close();
            window._audioContext = null;
        }
        if (window._micStream) {
            window._micStream.getTracks().forEach(t => t.stop());
            window._micStream = null;
        }
        if (window._tabStream) {
            window._tabStream.getTracks().forEach(t => t.stop());
            window._tabStream = null;
        }

        // stop main stream
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }

        setTimeout(() => {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
        }, 500);

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'stop' }));
        }

        stopTimer();

        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-stop').disabled = true;
        document.getElementById('btn-summary').disabled = false;
        document.getElementById('audio-source').disabled = false;
        document.getElementById('wave').classList.remove('active');
        setStatus('connected', 'Stopped');

        document.getElementById('qa-input').disabled = false;   // enable on start
        document.getElementById('qa-send').disabled = false;

        toast('Recording stopped', 'info', 4000);
    }

    // ── Generate summary ──────────────────────────────────
    function generateSummary() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            toast('Not connected', 'error');
            return;
        }

        ws.send(JSON.stringify({ type: 'generate_summary' }));
        document.getElementById('btn-summary').disabled = true;

        // show thinking state
        document.getElementById('summary-content').innerHTML = `
            <div class="thinking">
                <span></span><span></span><span></span>
            </div>
            <p style="color: var(--muted); font-size: 12px; margin-top: 8px;">Generating summary...</p>
        `;

        toast('Generating summary...', 'info');
    }

    // ── Send question ─────────────────────────────────────
    function sendQuestion() {
        const input = document.getElementById('qa-input');
        const question = input.value.trim();

        if (!question) return;

        if (!ws || ws.readyState !== WebSocket.OPEN) {
            toast('Not connected', 'error');
            return;
        }

        // render question bubble
        const messages = document.getElementById('qa-messages');
        const qEl = document.createElement('div');
        qEl.className = 'qa-message qa-question';
        qEl.textContent = question;
        messages.appendChild(qEl);
        messages.scrollTop = messages.scrollHeight;

        // show thinking
        const thinking = document.createElement('div');
        thinking.className = 'qa-message qa-answer';
        thinking.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
        messages.appendChild(thinking);

        // send to backend
        ws.send(JSON.stringify({ type: 'question', text: question }));

        // disable input while waiting
        input.disabled = true;
        document.getElementById('qa-send').disabled = true;

        // remove thinking when answer arrives (handled in renderQAAnswer)
        thinking.id = 'qa-thinking';
    }

    // ── Clear session ─────────────────────────────────────
    function clearSession() {
        if (isRecording) {
            toast('Stop recording first', 'error');
            return;
        }

        document.getElementById('transcript-content').innerHTML = `
            <div class="transcript-empty">
                <div class="icon">🎙</div>
                <p>Start recording to see live transcript</p>
            </div>
        `;
        document.getElementById('summary-content').innerHTML = `
            <div class="summary-empty">
                <div class="icon">✦</div>
                <p>Summary appears here after stopping recording</p>
            </div>
        `;
        document.getElementById('progressive-content').innerHTML = `
            <div class="summary-empty">
                <div class="icon">⟳</div>
                <p>Auto-updates every 10 minutes during recording</p>
            </div>
        `;
        document.getElementById('qa-messages').innerHTML = '';
        document.getElementById('transcript-count').textContent = '0 chunks';
        document.getElementById('summary-badge').textContent = '—';
        document.getElementById('prog-badge').textContent = 'Updates every 10 min';
        document.getElementById('timer').textContent = '00:00';

        chunkCount = 0;
        wordCount = 0;
        updateStats();

        if (ws) ws.close();

        toast('Session cleared', 'info');
    }

    // ── Helpers ───────────────────────────────────────────
    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function parseMarkdown(text) {
        return text
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^- (.+)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n\n/g, '<br>');
    }
</script>
